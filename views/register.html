<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Dompet Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-center relative overflow-hidden selection:bg-blue-500 selection:text-white py-12">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-96 opacity-20 pointer-events-none z-0">
        <div class="absolute top-[-20%] right-[10%] w-[400px] h-[400px] bg-indigo-400 rounded-full filter blur-[100px]"></div>
        <div class="absolute bottom-0 left-[10%] w-[350px] h-[350px] bg-blue-300 rounded-full filter blur-[100px]"></div>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 px-4">
        <div class="flex flex-col items-center mb-8">
            <a href="/" class="flex items-center gap-2 mb-4">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-md shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">DompetMandiri</span>
            </a>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight text-center">Mulai langkah finansial Anda</h2>
            <p class="mt-1.5 text-sm text-slate-500 text-center">Buat akun gratis dan pantau keuangan dengan mudah</p>
        </div>

        <div class="bg-white py-8 px-6 shadow-xl shadow-slate-200/50 rounded-3xl border border-slate-100 sm:px-10">
            
            {{if .error}}
            <div class="mb-4 bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-xl text-sm flex items-center gap-2 font-medium">
                <span>⚠️</span> {{.error}}
            </div>
            {{end}}

            <form action="/register" method="POST" class="space-y-5">
                <div>
                    <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Nama Pengguna (Username)</label>
                    <div class="mt-1.5">
                        <input id="username" name="username" type="text" required 
                            placeholder="ex: budisatria"
                            class="appearance-none block w-full px-4 py-3.5 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all bg-slate-50/50 focus:bg-white">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Alamat Email</label>
                    <div class="mt-1.5">
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            placeholder="nama@email.com"
                            class="appearance-none block w-full px-4 py-3.5 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all bg-slate-50/50 focus:bg-white">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Kata Sandi Baru</label>
                    <div class="mt-1.5">
                        <input id="password" name="password" type="password" required 
                            placeholder="Min. 6 karakter"
                            class="appearance-none block w-full px-4 py-3.5 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all bg-slate-50/50 focus:bg-white">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" 
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md shadow-blue-200 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform active:scale-[0.98]">
                        Buat Akun Sekarang
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center border-t border-slate-100 pt-5">
                <p class="text-sm text-slate-500">
                    Sudah memiliki akun? 
                    <a href="/login" class="font-bold text-blue-600 hover:text-blue-700 transition-colors">Masuk di sini</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
