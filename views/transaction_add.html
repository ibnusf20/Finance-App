<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catat Transaksi - Dompet Mandiri</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col selection:bg-blue-500 selection:text-white">

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm shadow-slate-100/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Brand Logo -->
                <div class="flex items-center gap-2">
                    <a href="/dashboard" class="bg-blue-600 p-2 rounded-xl text-white block">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </a>
                    <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">DompetMandiri</span>
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-4">
                    <a href="/dashboard" class="text-xs sm:text-sm font-semibold text-slate-600 hover:text-blue-600 px-3 py-2 transition-colors">
                        ← Kembali ke Dashboard
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Form Container -->
    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-10">
        
        <!-- Header Page Title -->
        <div class="mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">📝 Catat Transaksi Baru</h1>
            <p class="text-slate-500 text-sm mt-1">Isi formulir di bawah ini untuk memperbarui pembukuan saldo Anda.</p>
        </div>

        <!-- Form Card White Box -->
        <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-xl shadow-slate-200/40 border border-slate-100">
            
            <form action="/dashboard/transaction" method="POST" class="space-y-6">
                
                <!-- 1. Pilihan Tipe Transaksi (Income / Expense Tab Style) -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2.5">Jenis Transaksi</label>
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Tab Pemasukan -->
                        <label class="relative flex items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 cursor-pointer transition-all hover:bg-slate-50 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50/30 group">
                            <input type="radio" name="type" value="income" class="sr-only" checked required>
                            <div class="text-center">
                                <span class="block text-xl mb-1">💰</span>
                                <span class="block text-sm font-bold text-slate-700 group-has-[:checked]:text-emerald-700">Pemasukan</span>
                            </div>
                        </label>
                        
                        <!-- Tab Pengeluaran -->
                        <label class="relative flex items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 cursor-pointer transition-all hover:bg-slate-50 has-[:checked]:border-rose-500 has-[:checked]:bg-rose-50/30 group">
                            <input type="radio" name="type" value="expense" class="sr-only">
                            <div class="text-center">
                                <span class="block text-xl mb-1">💸</span>
                                <span class="block text-sm font-bold text-slate-700 group-has-[:checked]:text-rose-700">Pengeluaran</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 2. Input Nominal Angka / Jumlah -->
                <div>
                    <label for="amount" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Jumlah Nominal (Rupiah)</label>
                    <div class="relative mt-1 rounded-2xl shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <span class="text-slate-400 font-bold text-sm">Rp</span>
                        </div>
                        <input type="number" name="amount" id="amount" required min="1" placeholder="0"
                            class="block w-full rounded-2xl border border-slate-200 pl-11 pr-4 py-4 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 font-bold text-lg tracking-wide text-slate-900 bg-slate-50/50 focus:bg-white transition-all">
                    </div>
                </div>

                <!-- 3. Kategori Transaksi (Dropdown Select) -->
                <div>
                    <label for="category" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Kategori</label>
                    <div class="mt-1">
                        <select name="category" id="category" required
                            class="block w-full rounded-2xl border border-slate-200 px-4 py-3.5 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm text-slate-800 bg-slate-50/50 focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected hidden>Pilih Kategori...</option>
                            <option value="Gaji / Omset">💼 Gaji / Omset Bisnis</option>
                            <option value="Makanan & Minuman">🍔 Makanan & Minuman</option>
                            <option value="Kebutuhan Rumah">🏠 Kebutuhan Rumah Tangga</option>
                            <option value="Transportasi">🚗 Transportasi & Bensin</option>
                            <option value="Hiburan / Self Reward">🎉 Hiburan & Rekreasi</option>
                            <option value="Investasi / Tabungan">📈 Investasi & Tabungan</option>
                            <option value="Lain-lain">✨ Kategori Lain-Lain</option>
                        </select>
                    </div>
                </div>

                <!-- 4. Deskripsi Catatan Tambahan -->
                <div>
                    <label for="description" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Deskripsi / Catatan Tambahan</label>
                    <div class="mt-1">
                        <textarea name="description" id="description" rows="3" placeholder="Contoh: Beli token listrik bulanan rumah induk"
                            class="block w-full rounded-2xl border border-slate-200 px-4 py-3.5 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm text-slate-800 bg-slate-50/50 focus:bg-white transition-all"></textarea>
                    </div>
                </div>

                <!-- Submit and Cancel Buttons -->
                <div class="pt-4 flex flex-col sm:flex-row gap-3">
                    <button type="submit"
                        class="w-full sm:flex-1 justify-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-blue-200 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform active:scale-[0.99] order-1 sm:order-2">
                        Simpan Catatan Keuangan
                    </button>
                    <a href="/dashboard"
                        class="w-full sm:w-auto text-center py-4 px-6 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-600 bg-white hover:bg-slate-50 shadow-sm transition-all order-2 sm:order-1">
                        Batal
                    </a>
                </div>

            </form>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-400">
            <p>&copy; 2026 Dompet Mandiri Ledger System. Hak Cipta Dilindungi.</p>
        </div>
    </footer>

</body>
</html>
