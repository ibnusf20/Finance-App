<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Transaksi - Finance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @media (max-width: 991.98px) {
            .navbar-collapse {
                background: #0d6efd;
                padding: 1rem;
                border-radius: 8px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">Finance App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMainContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMainContent">
                <!-- Menu Navigasi Halaman -->
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="/dashboard">Ringkasan</a>
                    <a class="nav-link active" href="/dashboard/transaction/add">Tambah Transaksi</a>
                    <a class="nav-link" href="/dashboard/history">Riwayat Log</a>
                </div>
                <!-- Info User & Logout -->
                <div class="navbar-nav ms-auto align-items-center">
                    <span class="nav-link text-white me-lg-3 mb-2 mb-lg-0">Halo, <strong>{{.Username}}</strong></span>
                    <a href="/logout" class="btn btn-danger btn-sm px-3 w-100 w-lg-auto">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 text-primary">Catat Transaksi Baru</h5>
                        
                        <form action="/dashboard/transaction" method="POST">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Jenis Transaksi</label>
                                <select name="type" class="form-select" required>
                                    <option value="income">Pemasukan (Income)</option>
                                    <option value="expense">Pengeluaran (Expense)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Jumlah (Rp)</label>
                                <input type="number" name="amount" class="form-control form-control-lg" placeholder="0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Kategori</label>
                                <input type="text" name="category" class="form-control" placeholder="Makan, Gaji, Listrik, Investasi" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Keterangan Opsional</label>
                                <textarea name="description" class="form-control" rows="3" placeholder="Tulis catatan ringkas di sini..."></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <a href="/dashboard" class="btn btn-light w-50">Batal</a>
                                <button type="submit" class="btn btn-primary w-50 fw-bold shadow-sm">Simpan Transaksi</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
